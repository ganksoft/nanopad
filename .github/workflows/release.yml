name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v7

    - name: Extract version from tag
      id: version
      shell: pwsh
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "TAG=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT

    - name: Inject version into source
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $parts = $version.Split('.')
        $major = $parts[0]; $minor = if ($parts.Length -gt 1) { $parts[1] } else { "0" }; $patch = if ($parts.Length -gt 2) { $parts[2] } else { "0" }

        $file = "src\version.h"
        $content = Get-Content $file -Raw
        $content = $content -replace 'SN_VERSION_MAJOR\s+\d+', "SN_VERSION_MAJOR  $major"
        $content = $content -replace 'SN_VERSION_MINOR\s+\d+', "SN_VERSION_MINOR  $minor"
        $content = $content -replace 'SN_VERSION_PATCH\s+\d+', "SN_VERSION_PATCH  $patch"
        $content = $content -replace 'SN_VERSION_STR\s+"[^"]*"', "SN_VERSION_STR    `"$version`""
        $content = $content -replace 'SN_VERSION_WSTR\s+L"[^"]*"', "SN_VERSION_WSTR   L`"$version`""
        Set-Content $file $content

        Write-Host "Stamped version.h: $version ($major.$minor.$patch)"

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Build Release x64
      run: msbuild Nanopad.sln /p:Configuration=Release /p:Platform=x64 /nologo /v:minimal

    - name: Build Release ARM64
      run: msbuild Nanopad.sln /p:Configuration=Release /p:Platform=ARM64 /nologo /v:minimal

    - name: Create distribution
      id: dist
      shell: pwsh
      run: |
        $ver = "${{ steps.version.outputs.VERSION }}"

        # x64 zip
        $x64Dir = "Nanopad-$ver-x64"
        New-Item -ItemType Directory -Path $x64Dir | Out-Null
        Copy-Item "bin\Release-x64\nanopad.exe" $x64Dir\
        Copy-Item "README.md" $x64Dir\
        Copy-Item "CHANGELOG.md" $x64Dir\
        Copy-Item "LICENSE" $x64Dir\
        $x64ExeHash = (Get-FileHash "$x64Dir\nanopad.exe" -Algorithm SHA256).Hash
        "$x64ExeHash  nanopad.exe" | Out-File -Encoding ASCII "$x64Dir\SHA256SUMS.txt"
        Compress-Archive -Path "$x64Dir\*" -DestinationPath "$x64Dir.zip"
        $x64ZipHash = (Get-FileHash "$x64Dir.zip" -Algorithm SHA256).Hash

        # ARM64 zip
        $armDir = "Nanopad-$ver-arm64"
        New-Item -ItemType Directory -Path $armDir | Out-Null
        Copy-Item "bin\Release-ARM64\nanopad.exe" $armDir\
        Copy-Item "README.md" $armDir\
        Copy-Item "CHANGELOG.md" $armDir\
        Copy-Item "LICENSE" $armDir\
        $armExeHash = (Get-FileHash "$armDir\nanopad.exe" -Algorithm SHA256).Hash
        "$armExeHash  nanopad.exe" | Out-File -Encoding ASCII "$armDir\SHA256SUMS.txt"
        Compress-Archive -Path "$armDir\*" -DestinationPath "$armDir.zip"
        $armZipHash = (Get-FileHash "$armDir.zip" -Algorithm SHA256).Hash

        echo "X64_ZIP=$x64Dir.zip" >> $env:GITHUB_OUTPUT
        echo "ARM64_ZIP=$armDir.zip" >> $env:GITHUB_OUTPUT
        echo "X64_EXE_HASH=$x64ExeHash" >> $env:GITHUB_OUTPUT
        echo "X64_ZIP_HASH=$x64ZipHash" >> $env:GITHUB_OUTPUT
        echo "ARM64_EXE_HASH=$armExeHash" >> $env:GITHUB_OUTPUT
        echo "ARM64_ZIP_HASH=$armZipHash" >> $env:GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          ${{ steps.dist.outputs.X64_ZIP }}
          ${{ steps.dist.outputs.ARM64_ZIP }}
        generate_release_notes: true
        body: |
          ## Nanopad ${{ steps.version.outputs.VERSION }}

          ### Download
          Extract the zip and run `nanopad.exe`. Settings are stored in `nanopad.ini` next to the executable.

          | Platform | Download |
          |----------|----------|
          | x64 | `Nanopad-${{ steps.version.outputs.VERSION }}-x64.zip` |
          | ARM64 | `Nanopad-${{ steps.version.outputs.VERSION }}-arm64.zip` |

          ### Install via winget
          ```
          winget install Ganksoft.Nanopad
          ```

          ### SHA256
          ```
          ${{ steps.dist.outputs.X64_EXE_HASH }}  nanopad.exe (x64)
          ${{ steps.dist.outputs.X64_ZIP_HASH }}  Nanopad-${{ steps.version.outputs.VERSION }}-x64.zip
          ${{ steps.dist.outputs.ARM64_EXE_HASH }}  nanopad.exe (arm64)
          ${{ steps.dist.outputs.ARM64_ZIP_HASH }}  Nanopad-${{ steps.version.outputs.VERSION }}-arm64.zip
          ```

    - name: Publish to winget
      uses: vedantmgoyal9/winget-releaser@v2
      with:
        identifier: Ganksoft.Nanopad
        version: ${{ steps.version.outputs.VERSION }}
        installers-regex: '\.zip$'
        token: ${{ secrets.WINGET_TOKEN }}
