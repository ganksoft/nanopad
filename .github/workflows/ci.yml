name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-2022
    strategy:
      matrix:
        configuration: [Debug, Release]
        platform: [x64, ARM64]

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build
      run: msbuild Nanopad.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /nologo /v:minimal

    - name: Verify output
      if: matrix.configuration == 'Release'
      run: |
        $outDir = "bin\Release-${{ matrix.platform }}"
        if (!(Test-Path "$outDir\nanopad.exe")) { throw "Build output not found" }
        $size = (Get-Item "$outDir\nanopad.exe").Length
        Write-Host "nanopad.exe (${{ matrix.platform }}): $size bytes"
